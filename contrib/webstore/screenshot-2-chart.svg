<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" width="1280" height="800">
  <defs>
    <linearGradient id="bgGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#18181b"/>
      <stop offset="100%" stop-color="#09090b"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#6b21a8"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="ghostGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="shadow2">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <rect width="1280" height="800" fill="url(#bgGrad2)"/>

  <!-- Grid pattern -->
  <g opacity="0.03">
    <pattern id="grid2" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#fff" stroke-width="0.5"/>
    </pattern>
    <rect width="1280" height="800" fill="url(#grid2)"/>
  </g>

  <!-- Title -->
  <text x="640" y="80" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="700" fill="#fafafa" letter-spacing="-1">
    Headcount Trend Charts
  </text>
  <text x="640" y="120" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#71717a">
    See workforce growth and decline from real SEC 10-K filings
  </text>

  <!-- Chart mockup -->
  <g transform="translate(140, 160)" filter="url(#shadow2)">
    <rect width="1000" height="560" rx="16" fill="#18181b" stroke="#27272a" stroke-width="1"/>

    <!-- Chart header -->
    <g transform="translate(30, 25)">
      <g transform="scale(0.7)">
        <path d="M12 2C7.6 2 4 5.6 4 10v10.5c0 .6.4.8.9.5l2.1-2.1 2.1 2.1c.3.3.9.3 1.2 0L12 19.4l1.7 1.6c.3.3.9.3 1.2 0l2.1-2.1 2.1 2.1c.5.3.9.1.9-.5V10c0-4.4-3.6-8-8-8zM9 12a1.5 1.5 0 110-3 1.5 1.5 0 010 3zm6 0a1.5 1.5 0 110-3 1.5 1.5 0 010 3z" fill="url(#ghostGrad2)"/>
      </g>
      <text x="24" y="14" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#fafafa">Cisco</text>
      <text x="0" y="34" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#71717a">6 years of headcount data from SEC 10-K filings</text>
    </g>

    <!-- Legend -->
    <g transform="translate(30, 80)">
      <rect x="0" y="0" width="10" height="10" rx="2" fill="#a855f7"/>
      <text x="16" y="9" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#71717a">Headcount</text>
      <line x1="90" y1="5" x2="100" y2="5" stroke="#22d3ee" stroke-width="2" stroke-linecap="round"/>
      <text x="106" y="9" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#71717a">YoY Change</text>
    </g>

    <!-- Y axis labels -->
    <text x="70" y="120" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#71717a">100.0K</text>
    <text x="70" y="205" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#71717a">80.0K</text>
    <text x="70" y="290" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#71717a">60.0K</text>
    <text x="70" y="375" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#71717a">40.0K</text>
    <text x="70" y="460" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#71717a">20.0K</text>
    <text x="70" y="500" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#71717a">0</text>

    <!-- Grid lines -->
    <g opacity="0.3">
      <line x1="80" y1="116" x2="940" y2="116" stroke="#27272a" stroke-dasharray="4,4"/>
      <line x1="80" y1="201" x2="940" y2="201" stroke="#27272a" stroke-dasharray="4,4"/>
      <line x1="80" y1="286" x2="940" y2="286" stroke="#27272a" stroke-dasharray="4,4"/>
      <line x1="80" y1="371" x2="940" y2="371" stroke="#27272a" stroke-dasharray="4,4"/>
      <line x1="80" y1="456" x2="940" y2="456" stroke="#27272a" stroke-dasharray="4,4"/>
    </g>

    <!-- X axis line -->
    <line x1="80" y1="500" x2="940" y2="500" stroke="#3f3f46"/>

    <!-- Bars -->
    <!-- 2020: 77,500 → height = 77.5% of 390 = 302 -->
    <rect x="120" y="198" width="80" height="302" rx="4" fill="url(#barGrad)"/>
    <text x="160" y="190" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#d4d4d8">77.5K</text>
    <text x="160" y="520" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#71717a">2020</text>

    <!-- 2021: 79,500 → 310 -->
    <rect x="260" y="190" width="80" height="310" rx="4" fill="url(#barGrad)"/>
    <text x="300" y="182" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#d4d4d8">79.5K</text>
    <text x="300" y="520" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#71717a">2021</text>

    <!-- 2022: 83,300 → 325 -->
    <rect x="400" y="175" width="80" height="325" rx="4" fill="url(#barGrad)"/>
    <text x="440" y="167" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#d4d4d8">83.3K</text>
    <text x="440" y="520" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#71717a">2022</text>

    <!-- 2023: 84,900 → 331 -->
    <rect x="540" y="169" width="80" height="331" rx="4" fill="url(#barGrad)"/>
    <text x="580" y="161" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#d4d4d8">84.9K</text>
    <text x="580" y="520" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#71717a">2023</text>

    <!-- 2024: 90,400 → 352 -->
    <rect x="680" y="148" width="80" height="352" rx="4" fill="url(#barGrad)"/>
    <text x="720" y="140" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#d4d4d8">90.4K</text>
    <text x="720" y="520" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#71717a">2024</text>

    <!-- 2025: 86,200 → 336 -->
    <rect x="820" y="164" width="80" height="336" rx="4" fill="url(#barGrad)"/>
    <text x="860" y="156" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#d4d4d8">86.2K</text>
    <text x="860" y="520" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#71717a">2025</text>

    <!-- YoY % line -->
    <path d="M300,260 C370,260 370,240 440,240 C510,240 510,270 580,270 C650,270 650,220 720,220 C790,220 790,380 860,380" fill="none" stroke="#22d3ee" stroke-width="2.5" stroke-linecap="round"/>

    <!-- YoY dots and labels -->
    <circle cx="300" cy="260" r="4" fill="#22d3ee"/>
    <text x="300" y="250" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#34d399">+3%</text>

    <circle cx="440" cy="240" r="4" fill="#22d3ee"/>
    <text x="440" y="230" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#34d399">+5%</text>

    <circle cx="580" cy="270" r="4" fill="#22d3ee"/>
    <text x="580" y="260" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#34d399">+2%</text>

    <circle cx="720" cy="220" r="4" fill="#22d3ee"/>
    <text x="720" y="210" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#34d399">+6%</text>

    <circle cx="860" cy="380" r="4" fill="#22d3ee"/>
    <text x="860" y="395" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#f87171">-5%</text>

    <!-- Right Y axis labels -->
    <text x="950" y="220" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#0891b2">+6%</text>
    <text x="950" y="310" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#0891b2">+0%</text>
    <text x="950" y="400" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#0891b2">-6%</text>

    <!-- Axis labels -->
    <text x="70" y="105" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#52525b">Employees</text>
    <text x="950" y="105" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#0e7490">YoY %</text>
  </g>
</svg>
