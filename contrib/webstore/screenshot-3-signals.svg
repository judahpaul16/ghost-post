    <text x="30" y="85" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#52525b">Source: layoffs.fyi</text>
  </g>

  <g transform="translate(465, 450)" filter="url(#shadow3)">
    <rect width="350" height="110" rx="12" fill="#18181b" stroke="#27272a" stroke-width="1"/>
    <circle cx="30" cy="35" r="10" fill="#ef4444" opacity="0.2"/>
    <circle cx="30" cy="35" r="5" fill="#ef4444"/>
    <text x="50" y="32" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#e4e4e7">Wayback Machine</text>
    <text x="320" y="32" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#ef4444">+15</text>
    <text x="50" y="52" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#71717a">URL first seen 94 days ago</text>
    <text x="30" y="85" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#52525b">Source: Wayback Machine</text>
  </g>

  <g transform="translate(850, 450)" filter="url(#shadow3)">
    <rect width="350" height="110" rx="12" fill="#18181b" stroke="#27272a" stroke-width="1"/>
    <circle cx="30" cy="35" r="10" fill="#ef4444" opacity="0.2"/>
    <circle cx="30" cy="35" r="5" fill="#ef4444"/>
    <text x="50" y="32" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#e4e4e7">Posting Age</text>
    <text x="320" y="32" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#ef4444">+25</text>
    <text x="50" y="52" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#71717a">Posted 72 days ago</text>
    <text x="30" y="85" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#52525b">Source: Page Data</text>
  </g>

  <!-- Bottom caption -->
  <text x="640" y="640" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#52525b">
    Green = positive signal (-points)  |  Yellow = minor concern (+points)  |  Red = major concern (+points)
  </text>

  <!-- Score examples -->
  <g transform="translate(240, 680)">
    <rect width="200" height="60" rx="10" fill="#052e16" stroke="#166534" stroke-width="1"/>
    <circle cx="40" cy="30" r="18" fill="none" stroke="#22c55e" stroke-width="3"/>
    <text x="40" y="36" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#22c55e">12</text>
    <text x="75" y="26" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#22c55e">Likely Real</text>
    <text x="75" y="42" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#4ade80">Score 0-25</text>
  </g>

  <g transform="translate(540, 680)">
    <rect width="200" height="60" rx="10" fill="#422006" stroke="#854d0e" stroke-width="1"/>
    <circle cx="40" cy="30" r="18" fill="none" stroke="#eab308" stroke-width="3"/>
    <text x="40" y="36" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#eab308">38</text>
    <text x="75" y="26" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#eab308">Caution</text>
    <text x="75" y="42" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#fbbf24">Score 26-50</text>
  </g>

  <g transform="translate(840, 680)">
    <rect width="200" height="60" rx="10" fill="#450a0a" stroke="#991b1b" stroke-width="1"/>
    <circle cx="40" cy="30" r="18" fill="none" stroke="#ef4444" stroke-width="3"/>
    <text x="40" y="36" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#ef4444">73</text>
    <text x="75" y="26" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#ef4444">Likely Ghost</text>
    <text x="75" y="42" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#f87171">Score 51-100</text>
  </g>
</svg>
